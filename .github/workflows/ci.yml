name: CI (Prettier with Apex)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  prettier-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install Prettier + Apex plugin only
        run: npm i -D prettier prettier-plugin-apex
      - name: Prettier check (all files, including Apex)
        run: npx prettier --check .
